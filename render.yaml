# render Blueprint — 一鍵部署前端 + 雙後端 + PostgreSQL
# 文件：https://render.com/docs/blueprint-spec
# 注意：實際 build/start 指令待各子專案就緒後校正；密鑰（GEMINI_API_KEY 等）在 render 後台填，勿入庫。

databases:
  - name: scam-db
    databaseName: scam
    plan: free

services:
  # --- Python FastAPI：偵測模型 / 統計 / Gemini ---
  - type: web
    name: backend-api
    runtime: python
    plan: free
    rootDir: backend-api
    buildCommand: pip install -r requirements.txt && python -m model.train
    startCommand: gunicorn app.flask_app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scam-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MONTHLY_CAP
        value: "1000"
      - key: ALLOWED_ORIGINS         # 上線後填前端網址，鎖 CORS（勿用 *）
        sync: false

  # --- Vue 前端：靜態網站 ---
  - type: web
    name: frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # 兩個後端部署好後，把它們的網址(https://xxx.onrender.com)填進這兩個，再 Manual Deploy 前端一次
      - key: VITE_API_URL
        sync: false
      - key: VITE_NODE_URL
        sync: false
    routes:
      - type: rewrite        # SPA fallback（雖用 hash 路由，保險起見）
        source: /*
        destination: /index.html
